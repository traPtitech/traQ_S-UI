name: CI

on:
  push:
    branches:
      - 'master'
  pull_request:

jobs:
  packages:
    name: check npm install
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./.node-version
          cache: npm

      - name: check npm ci
        run: npm ci

  lint:
    name: run lint
    runs-on: ubuntu-latest
    needs: [packages]
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./.node-version
          cache: npm

      - name: restore ESLint cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .eslintcache
          key: eslint-cache-${{ runner.os }}-${{ hashFiles('eslint.config.mjs', '.eslintignore', 'package-lock.json') }}
          restore-keys: |
            eslint-cache-${{ runner.os }}-

      - name: npm ci
        run: npm ci
        env:
          CYPRESS_INSTALL_BINARY: 0

      - name: run lint
        run: npm run lint:no-fix -- --max-warnings=0

  format:
    name: run format
    runs-on: ubuntu-latest
    needs: [packages]

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./.node-version
          cache: npm

      - name: restore Prettier cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: node_modules/.cache/prettier
          key: prettier-cache-${{ runner.os }}-${{ hashFiles('.prettierrc', '.prettierignore', 'package-lock.json') }}
          restore-keys: |
            prettier-cache-${{ runner.os }}-

      - name: npm ci
        run: npm ci
        env:
          CYPRESS_INSTALL_BINARY: 0

      - name: run format
        run: npx prettier --cache --check .

  type-check:
    name: run type-check
    runs-on: ubuntu-latest
    needs: [packages]

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./.node-version
          cache: npm

      - name: npm ci
        run: npm ci
        env:
          CYPRESS_INSTALL_BINARY: 0

      - name: run type-check
        run: npm run type-check

  build:
    name: run build
    runs-on: ubuntu-latest
    needs: [packages]

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./.node-version
          cache: npm

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ./public/fonts
          key: font-build-${{ runner.os }}
          restore-keys: |
            font-build-${{ runner.os }}

      - name: npm ci
        run: npm ci
        env:
          CYPRESS_INSTALL_BINARY: 0

      - name: run build
        run: npm run build:may-with-font

  test-unit:
    name: run test:unit
    runs-on: ubuntu-latest
    needs: [packages]

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./.node-version
          cache: npm

      - name: npm ci
        run: npm ci
        env:
          CYPRESS_INSTALL_BINARY: 0

      - name: run test:unit
        run: npm run test:unit

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: ./coverage

  codecov:
    name: Upload coverage to Codecov
    runs-on: ubuntu-latest
    needs: [test-unit]

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage
          path: ./coverage

      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test-e2e:
    name: run test:e2e
    runs-on: ubuntu-latest
    needs: [packages]

    if: (github.repository_owner == 'traPtitech' && github.actor != 'dependabot[bot]')
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./.node-version
          cache: npm

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ./public/fonts
          key: font-build-${{ runner.os }}
          restore-keys: |
            font-build-${{ runner.os }}

      - name: npm ci
        run: npm ci

      - name: run test:e2e
        run: npm run test:e2e-headless
        if: env.CYPRESS_username != null
        env:
          CYPRESS_username: ${{ secrets.traQ_username }}
          CYPRESS_password: ${{ secrets.traQ_password }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: failed-screenshots
          path: ./tests/e2e/screenshots
        if: ${{ failure() }}
